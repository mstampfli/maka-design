<!-- @dsCard group="Type" viewport="700x230" subtitle="IBM Plex Mono headings + labels, IBM Plex Sans body" name="Typography" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style> body { padding: 20px 24px; } </style>
</head>
<body class="mk-no-scanlines">
  <span class="mk-kicker">kicker · ibm plex mono 11/500 · ls 0.14em</span>
  <h2 style="margin-bottom: 4px;">Heading — Plex Mono 600</h2>
  <p class="mk-muted" style="font-size: var(--mk-text-sm); margin-bottom: 14px;">Body — IBM Plex Sans 400, 15/1.65. Warm cream on roasted brown; links in <a href="#">burnt orange</a>, inline code in <code>amber</code>.</p>
  <div style="display: flex; gap: 10px; align-items: center;">
    <span class="mk-label">form label</span>
    <span class="mk-tag">tag</span>
    <span class="mk-tag mk-tag--accent">accent</span>
    <span class="mk-mono mk-faint" style="font-size: var(--mk-text-xs);">mono faint · tabular nums 0123456789</span>
  </div>
</body>
</html>
