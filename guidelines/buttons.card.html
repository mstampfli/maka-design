<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style> body { padding: 20px 24px; } </style>
</head>
<body class="mk-no-scanlines">
  <div class="mk-stack" style="gap: 12px;">
    <div class="mk-row">
      <button class="mk-btn mk-btn--primary">primary</button>
      <button class="mk-btn mk-btn--ghost">ghost</button>
      <button class="mk-btn mk-btn--danger">danger</button>
      <button class="mk-btn mk-btn--primary" disabled>disabled</button>
    </div>
    <div class="mk-row">
      <button class="mk-btn mk-btn--primary mk-btn--sm">small</button>
      <button class="mk-btn mk-btn--ghost mk-btn--sm">small</button>
      <button class="mk-btn mk-btn--primary mk-btn--lg">large</button>
    </div>
  </div>
</body>
</html>
