<!-- @dsCard group="Components" viewport="700x250" subtitle="[ tag ] prefix in mono · tinted via color-mix from one status token" name="Alerts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style> body { padding: 16px 20px; } </style>
</head>
<body class="mk-no-scanlines">
  <div class="mk-stack" style="gap: 10px;">
    <div class="mk-alert"><span class="mk-alert__tag">[ info ]</span><div class="mk-alert__body">Neutral notice — same frame, no tint.</div></div>
    <div class="mk-alert mk-alert--success"><span class="mk-alert__tag">[ ok ]</span><div class="mk-alert__body">Build complete.</div></div>
    <div class="mk-alert mk-alert--warn"><span class="mk-alert__tag">[ warn ]</span><div class="mk-alert__body">Disk at 81%.</div></div>
    <div class="mk-alert mk-alert--danger"><span class="mk-alert__tag">[ fail ]</span><div class="mk-alert__body">Connection lost.</div></div>
  </div>
</body>
</html>
