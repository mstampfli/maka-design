<!-- @dsCard group="Colors" viewport="700x170" subtitle="Light variant — paper cream, brown ink, same orange" name="Palette · light" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; }
  .sw-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border: 2px solid var(--mk-border); border-radius: var(--mk-radius); height: 64px; }
  .sw-l { font-family: var(--mk-font-mono); font-size: 10px; color: var(--mk-text-2); margin-top: 5px; line-height: 1.4; }
  .cell { min-width: 0; }
</style>
</head>
<body class="mk-no-scanlines">
  <div class="sw-row">
    <div class="cell"><div class="sw" style="background: var(--mk-brown-0);"></div><div class="sw-l">page<br>#f1e8d8</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-brown-1);"></div><div class="sw-l">surface<br>#f8f1e3</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-clay-1);"></div><div class="sw-l">border<br>#d3c0a4</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-orange-1);"></div><div class="sw-l">accent<br>#c75f0d</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-amber-1);"></div><div class="sw-l">amber<br>#9c6b10</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-red-1);"></div><div class="sw-l">danger<br>#b83a28</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-cream-1);"></div><div class="sw-l">text<br>#2e1f10</div></div>
  </div>
</body>
</html>
