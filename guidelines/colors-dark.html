<!-- @dsCard group="Colors" viewport="700x170" subtitle="Dark (default) — roasted browns, burnt orange, cream" name="Palette · dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; }
  .sw-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border: 2px solid var(--mk-border); border-radius: var(--mk-radius); height: 64px; }
  .sw-l { font-family: var(--mk-font-mono); font-size: 10px; color: var(--mk-text-2); margin-top: 5px; line-height: 1.4; }
  .cell { min-width: 0; }
</style>
</head>
<body class="mk-no-scanlines">
  <div class="sw-row">
    <div class="cell"><div class="sw" style="background: var(--mk-brown-0);"></div><div class="sw-l">page<br>#1a120b</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-brown-1);"></div><div class="sw-l">surface<br>#221810</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-clay-1);"></div><div class="sw-l">border<br>#3c2a19</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-orange-1);"></div><div class="sw-l">accent<br>#e0731d</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-amber-1);"></div><div class="sw-l">amber<br>#eda43d</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-red-1);"></div><div class="sw-l">danger<br>#d9503c</div></div>
    <div class="cell"><div class="sw" style="background: var(--mk-cream-1);"></div><div class="sw-l">text<br>#f4ead9</div></div>
  </div>
</body>
</html>
